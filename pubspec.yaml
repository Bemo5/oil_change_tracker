name: oil_change
description: "Oil change tracker."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.7.2 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Routing + storage
  go_router: ^17.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Utilities
  uuid: ^4.5.2
  intl: ^0.20.2

  # Image picking + local file mgmt (Android/Windows)
  file_picker: ^10.3.10
  path_provider: ^2.1.5
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # Only needed if you are actually using Hive TypeAdapters.
  # If you're storing Map data (like we did), you can remove these 2.
  build_runner: ^2.5.4
  hive_generator: ^2.0.1

  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/app_icon.png

flutter_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#0F172A"
  adaptive_icon_foreground: "assets/app_icon.png"
